services:
  prometheus:
    image: prom/prometheus:latest

    container_name: prometheus

    restart: unless-stopped

    volumes:
      - /home/OrByZ/workspace/infrastructure/homelab/data/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /home/OrByZ/workspace/infrastructure/homelab/data/prometheus/data:/prometheus

    labels:
      - traefik.enable=true

      - traefik.http.routers.prometheus.rule=Host(`prometheus.orbyz.lab`)
      - traefik.http.routers.prometheus.entrypoints=web

      - traefik.http.services.prometheus.loadbalancer.server.port=9090

    networks:
      - homelab

networks:
  homelab:
    external: true
