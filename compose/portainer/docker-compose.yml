services:
  portainer:
    image: portainer/portainer-ce:2.39.4
    container_name: portainer

    command: --no-setup-token

    restart: unless-stopped

    ports:
      - "9000:9000"
      - "9443:9443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../data/portainer:/data
