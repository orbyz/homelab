services:
  uptime-kuma:
    image: louislam/uptime-kuma:1

    container_name: uptime-kuma

    restart: unless-stopped

    volumes:
      - /home/OrByZ/workspace/infrastructure/homelab/data/uptime-kuma:/app/data

    labels:
      - traefik.enable=true

      - traefik.http.routers.kuma.rule=Host(`kuma.orbyz.lab`)
      - traefik.http.routers.kuma.entrypoints=web

      - traefik.http.services.kuma.loadbalancer.server.port=3001

    networks:
      - homelab

networks:
  homelab:
    external: true
