services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma

    restart: unless-stopped

    ports:
      - "3001:3001"

    volumes:
      - /home/OrByZ/workspace/infrastructure/homelab/data/uptime-kuma:/app/data

    networks:
      - homelab

networks:
  homelab:
    external: true
