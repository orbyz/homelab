services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage

    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      PUID: 1000
      PGID: 1000

    volumes:
      - /home/OrByZ/workspace/infrastructure/homelab/data/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
