services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter

    restart: unless-stopped

    pid: host

    command:
      - --path.rootfs=/host

    volumes:
      - /:/host:ro,rslave

    ports:
      - "9100:9100"

    networks:
      - homelab

networks:
  homelab:
    external: true
