services:
  caddy:
    image: caddy:2.10

    container_name: caddy

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ../../data/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../data/caddy/data:/data
      - ../../data/caddy/config:/config

    networks:
      - homelab

networks:
  homelab:
    external: true
